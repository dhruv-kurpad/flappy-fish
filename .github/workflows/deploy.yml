# deploy.yml — all config from GitHub repository secrets only
# Settings → Secrets and variables → Actions
# Comment
name: Deploy FlappyFish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure CLI Login
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: ACR Login
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
            --username ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build & Push Frontend
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest \
            -f frontend/Dockerfile.react \
            --push ./frontend

      - name: Build & Push Flask API
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/flask-api:latest \
            -f src/Dockerfile.web \
            --push ./src

      - name: Build & Push Game Server
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/game-server:latest \
            -f src/Dockerfile.game \
            --push ./src

      - name: Deploy to Azure Container Instances
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file azuredeploy.json \
            --parameters acrServer=${{ secrets.ACR_LOGIN_SERVER }} \
                         acrUsername=${{ secrets.ACR_USERNAME }} \
                         acrPassword=${{ secrets.ACR_PASSWORD }} \
                         sqlUsername=${{ secrets.SQL_USERNAME }} \
                         sqlPassword=${{ secrets.SQL_PASSWORD }}
