# Three-container stack: Flask (DB API) + FastAPI (game) + React (nginx)
#
# Run from project root (one command per line):
#   cp .env.example .env
#   docker compose -f docker-compose.web.yml up --build
#   open http://localhost:8080

services:
  flask-api:
    build:
      context: src
      dockerfile: Dockerfile.web
    container_name: flask-api
    env_file:
      - .env
    environment:
      PORT: "5000"
    ports:
      - "5001:5000"
    networks:
      - webnet

  game-server:
    build:
      context: src
      dockerfile: Dockerfile.game
    container_name: game-server
    env_file:
      - .env
    environment:
      # for auth.py
      BASE_URL: http://flask-api:5000
    ports:
      - "8765:8765"
    depends_on:
      - flask-api
    networks:
      - webnet

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.react
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      - game-server
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
